services:
  mlflow:
    image: python:3.11-slim
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir 'mlflow==3.12.0' && \
        mlflow server \
          --host 0.0.0.0 --port 5000 \
          --backend-store-uri sqlite:////mlflow/mlflow.db \
          --artifacts-destination /mlartifacts \
          --serve-artifacts \
          --allowed-hosts 'mlflow:5000,mlflow,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,host.docker.internal,host.docker.internal:5000' \
          --cors-allowed-origins '*'
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
      - mlflow-artifacts:/mlartifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    platform: linux/amd64
    image: ghcr.io/gilvanveras/wine-mlops-solution/wine-classifier:latest
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONIOENCODING: utf-8
    depends_on:
      mlflow:
        condition: service_healthy
    restart: on-failure

volumes:
  mlflow-data:
  mlflow-artifacts:
